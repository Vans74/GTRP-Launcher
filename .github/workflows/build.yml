name: Build GTRP Launcher (Windows)

# Compile l'installeur Windows + artefacts d'auto-update signes.
# Chaque tag v* publie une GitHub Release avec latest.json (updater Tauri).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Tests unitaires (gtrp-core)
        working-directory: src-tauri/core
        run: cargo test

  build-windows:
    needs: test-core
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      # tauri-action compile, signe, GENERE latest.json et publie la release.
      # C'est l'action officielle : elle produit et attache automatiquement
      # latest.json (indispensable pour l'auto-update Tauri), contrairement a
      # un `tauri build` + upload manuel.
      - name: Build & release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: GTRP Launcher ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
