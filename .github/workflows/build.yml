name: Build GTRP Launcher (Windows)

# Compile l'installeur Windows sans qu'aucune machine Windows locale ne soit nécessaire.
# Ce dépôt a "launcher/" pour racine : les chemins sont donc relatifs à cette racine.
# Déclenché manuellement (Run workflow) ou à chaque tag "v*".

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # 1) Tests rapides de la logique métier (crate core, sans GUI) sous Linux.
  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Tests unitaires (gtrp-core)
        working-directory: src-tauri/core
        run: cargo test

  # 2) Build de l'installeur Windows.
  build-windows:
    needs: test-core
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build (Tauri + NSIS)
        run: npm run tauri build

      - name: Upload installeur
        uses: actions/upload-artifact@v4
        with:
          name: gtrp-launcher-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
